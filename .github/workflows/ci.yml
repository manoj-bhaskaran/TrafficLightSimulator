name: CI

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  build-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Build and test with Maven
        run: mvn -B verify

      - name: Upload jar artifact
        uses: actions/upload-artifact@v7
        with:
          name: traffic-light-simulator-jar
          path: target/*.jar
          if-no-files-found: error
          retention-days: 14

  sonar:
    name: SonarQube Cloud analysis
    runs-on: ubuntu-latest
    needs: build-test
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Cache SonarQube Cloud packages
        uses: actions/cache@v5
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Detect SonarQube Cloud token
        id: sonar-token
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -n "$SONAR_TOKEN" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "SONAR_TOKEN is not available; skipping SonarQube Cloud analysis."
          fi

      - name: Run SonarQube Cloud analysis
        if: steps.sonar-token.outputs.available == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn -B -Psonarcloud verify sonar:sonar -Dsonar.projectKey=manoj-bhaskaran_TrafficLightSimulator
